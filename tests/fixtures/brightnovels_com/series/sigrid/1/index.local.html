ng&gt;: &lt;a href=\&quot;https:\/\/ko-fi.com\/amalynne\&quot;&gt;&lt;strong style=\&quot;text-decoration: underline;\&quot;&gt;https:\/\/ko-fi.com\/amalynne&lt;\/strong&gt;&lt;\/a&gt;&lt;br&gt;Support me on &lt;strong&gt;Patreon&lt;\/strong&gt;: &lt;a href=\&quot;https:\/\/www.patreon.com\/c\/amalynne\/membership\&quot;&gt;&lt;strong style=\&quot;text-decoration: underline;\&quot;&gt;patreon.com\/amalynne&lt;\/strong&gt;&lt;\/a&gt;&lt;\/p&gt;&quot;,&quot;global_note_position&quot;:&quot;bottom&quot;},&quot;chapter&quot;:{&quot;id&quot;:66014,&quot;title&quot;:null,&quot;slug&quot;:&quot;1&quot;,&quot;number&quot;:1,&quot;content&quot;:&quot;&lt;p&gt;Why? Why? Why? Why? Why?&lt;\/p&gt;\n&lt;p&gt;Sigrid Ankertna looked down at the round barrel.&lt;\/p&gt;\n&lt;p&gt;Soon, when the guillotine blade fell, her head would drop into that container.&lt;\/p&gt;\n&lt;p&gt;Sigrid raised her head.&lt;\/p&gt;\n&lt;p&gt;She had lived by the rules.&lt;\/p&gt;\n&lt;p&gt;She had lived righteously.&lt;\/p&gt;\n&lt;p&gt;No matter what others did, she had followed the rules.&lt;\/p&gt;\n&lt;p&gt;She had been loyal to the Empire like a dog.&lt;\/p&gt;\n&lt;p&gt;But why?&lt;\/p&gt;\n&lt;p&gt;Why?&lt;\/p&gt;\n&lt;p&gt;Why?&lt;\/p&gt;\n&lt;p&gt;Why?&lt;\/p&gt;\n&lt;p&gt;Why did she have to kneel here like this?&lt;\/p&gt;\n&lt;p&gt;She bit her lip.&lt;\/p&gt;\n&lt;p&gt;\&quot;Execute!\&quot;&lt;\/p&gt;\n&lt;p&gt;At the same time, Sigrid felt her vision spin. The approaching bottom of the wooden barrel, and then darkness.&lt;\/p&gt;\n&lt;p&gt;\&quot;Ugh!\&quot;&lt;\/p&gt;\n&lt;p&gt;Struggling, she bolted upright in bed.&lt;\/p&gt;\n&lt;p&gt;\&quot;Huff, haa, haa, haa.\&quot;&lt;\/p&gt;\n&lt;p&gt;Covered in cold sweat, Sigrid touched her neck. It was attached. Properly.&lt;\/p&gt;\n&lt;p&gt;\&quot;What...?\&quot;&lt;\/p&gt;\n&lt;p&gt;The afterlife?&lt;\/p&gt;\n&lt;p&gt;Sigrid pushed aside the rough blanket and got up from the old bed.&lt;\/p&gt;\n&lt;p&gt;This small 4-pyeong room was all she had.&lt;\/p&gt;\n&lt;p&gt;Sigrid fumbled for the light switch and pushed open the window. The old wooden frame rattled heavily as it opened.&lt;\/p&gt;\n&lt;p&gt;As the cold air flowed in, Sigrid took a deep breath.&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;Is this what the afterlife is like?&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;It&#039;s exactly the same as where she used to live?&lt;\/p&gt;\n&lt;p&gt;Even the surrounding scenery was no different.&lt;\/p&gt;\n&lt;p&gt;With the window open, Sigrid took out a chipped teacup and teapot. Even the objects were the same.&lt;\/p&gt;\n&lt;p&gt;Confusion maintains habits. Without even realizing she was confused, Sigrid thought.&lt;\/p&gt;\n&lt;p&gt;&#039;It&#039;s surprisingly no different from reality.&#039;&lt;\/p&gt;\n&lt;p&gt;It didn&#039;t even feel like the afterlife. She lit a small burner to heat water for tea and took out some cheap tea leaves to make hot tea.&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;Tastes bad...&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;She thought vaguely as she drank the tea.&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;To have my head cut off and then wake up in my room. And now I&#039;m drinking tea like this.&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;It seemed like a ridiculous joke.&lt;\/p&gt;\n&lt;p&gt;Why had she lived like this, hoarding all that gold and silver? If she was going to die like that anyway, she should have indulged in some luxury.&lt;\/p&gt;\n&lt;p&gt;She lived like this because she thought a frugal life was proper for a knight. Sigrid slowly drank her tea while looking out the dark window.&lt;\/p&gt;\n&lt;p&gt;Isn&#039;t this a bit unfair?&lt;\/p&gt;\n&lt;p&gt;Nowhere did it say that people would live in the afterlife as they had lived. Does that mean a king would live in a palace even after death? And those from the slums would live in slums even after death...&lt;\/p&gt;\n&lt;p&gt;Thinking of the slums, Sigrid let out a small groan. There were slums in the capital, and they had all been cleaned out. She was the one who had done it.&lt;\/p&gt;\n&lt;p&gt;It was the virtue of a knight to naturally follow the Emperor&#039;s orders; the master&#039;s orders were absolute.&lt;\/p&gt;\n&lt;p&gt;She had blocked the entrances, set fires, and cut down all those who tried to escape. She had also killed all the knights and soldiers who protested that it was not something humans should do. Death was the only punishment for insubordination. Wasn&#039;t that obvious?&lt;\/p&gt;\n&lt;p&gt;A knight is the Emperor&#039;s tool.&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;That&#039;s what I thought. Until the Emperor passed the blame onto that tool.&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;Sigrid touched her neck again. It felt like her head could roll off at any moment. After finishing her tea, she got up.&lt;\/p&gt;\n&lt;p&gt;She wanted to know how identical this afterlife was to the mortal world. No, at least if this was the underworld, she wanted to find the god of the underworld and ask. Did I commit such a great sin?&lt;\/p&gt;\n&lt;p&gt;She opened the wardrobe to change from her nightclothes into everyday clothes. The wardrobe was also worn out, with one leg shorter than the others, propped up by a piece of wood. One of the doors was broken and would fall off if not opened carefully, but Sigrid had developed a knack for opening it well now.&lt;\/p&gt;\n&lt;p&gt;There were three sets of clothes in the wardrobe.&lt;\/p&gt;\n&lt;p&gt;A ceremonial uniform, and two shirts and two pairs of pants.&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;Come to think of it, Morris told me to buy some clothes.&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;Sigrid smiled faintly, thinking of her friend. He was one of the friends who had tried to get her out of prison until the very end.&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;I didn&#039;t expect him to come.&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;After the slum incident, quite a few of her friends had left her, but some of them came to visit her in prison. They believed in her innocence. Morris was one of them.&lt;\/p&gt;\n&lt;p&gt;After changing into everyday clothes, Sigrid put on her boots. Then, opening the door and stepping out, she saw an old, dark corridor. It was a multi-family housing area in one part of the capital. The wooden floor of the corridor was so worn out that it creaked, making it impossible for the people living here not to know when someone was passing through the corridor. But Sigrid skillfully walked across that floor without making a sound.&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;It&#039;s exactly the same.&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;It really is exactly the same. Nothing is different from the mortal world. Is this what the afterlife is like?&lt;\/p&gt;\n&lt;p&gt;Sigrid felt the urge to smack the theologians on the back of their heads as she stood in front of the building.&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;It&#039;s curfew time.&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;Is it okay to go out because it&#039;s the afterlife? Or is it not allowed because it&#039;s curfew time?&lt;\/p&gt;\n&lt;p&gt;After hesitating for a moment, Sigrid began to walk. Who cares if it&#039;s curfew time or whatever?&lt;\/p&gt;\n&lt;p&gt;She would welcome it if the messengers of the underworld came out.&lt;\/p&gt;\n&lt;p&gt;Stepping forward steadily, Sigrid started walking towards the Imperial Palace. Wouldn&#039;t the king of the underworld live in the Imperial Palace? As she was walking, she heard the sound of a whistle.&lt;\/p&gt;\n&lt;p&gt;\&quot;You there! Stop!\&quot;&lt;\/p&gt;\n&lt;p&gt;Sigrid stopped. Turning around, she saw two capital guards with spears walking towards her.&lt;\/p&gt;\n&lt;p&gt;\&quot;What are you doing out during curfew!\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Show your registration.\&quot;&lt;\/p&gt;\n&lt;p&gt;Sigrid was puzzled by the two men&#039;s words.&lt;\/p&gt;\n&lt;p&gt;\&quot;Registration?\&quot;&lt;\/p&gt;\n&lt;p&gt;As she tilted her head, the expressions of the two men became even more hostile. Are they talking about the registration from the mortal world? Or the one from the afterlife? If it&#039;s from the afterlife, she hasn&#039;t received it yet.&lt;\/p&gt;\n&lt;p&gt;\&quot;A suspicious person.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Let&#039;s go to the guard station.\&quot;&lt;\/p&gt;\n&lt;p&gt;Although it was a commanding tone, Sigrid nodded and followed obediently. It didn&#039;t matter where they went, as long as it was a place with public authority.&lt;\/p&gt;\n&lt;p&gt;Sigrid was surprised when she arrived at the guard station.&lt;\/p&gt;\n&lt;p&gt;\&quot;Lady Ankertna?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Captain Amu? Are you dead too?\&quot;&lt;\/p&gt;\n&lt;p&gt;Amu, the captain of the capital guard, was sitting in the guard room. It was exactly the same as usual. Amu, confused by Sigrid&#039;s strange words, said:&lt;\/p&gt;\n&lt;p&gt;\&quot;Dead? I&#039;m perfectly alive. No, more importantly, what happened to you?\&quot;&lt;\/p&gt;\n&lt;p&gt;It&#039;s common knowledge that this female knight never breaks the law. If she violated curfew, there must have been a good reason, Amu thought, grateful that the two guards who brought Sigrid weren&#039;t cut by her hand. If she had a valid reason and the two had stopped her, Sigrid wouldn&#039;t have spared them.&lt;\/p&gt;\n&lt;p&gt;\&quot;No, I&#039;m sure I died with my head cut off on the guillotine.\&quot;&lt;\/p&gt;\n&lt;p&gt;Sigrid mumbled softly, lost in confusion. Amu laughed awkwardly and said:&lt;\/p&gt;\n&lt;p&gt;\&quot;Did you perhaps have a dream? Lady Sigrid on the guillotine, there&#039;s no nightmare worse than that.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;A dream?\&quot;&lt;\/p&gt;\n&lt;p&gt;Sigrid stared blankly at Amu. This veteran guard captain in his mid-forties, with laugh lines around his eyes and mouth, didn&#039;t look like he was dreaming or dead at all.&lt;\/p&gt;\n&lt;p&gt;\&quot;Lady Ankertna?\&quot;&lt;\/p&gt;\n&lt;p&gt;Amu called her again when Sigrid remained silent. Her condition didn&#039;t seem normal at all. Sigrid shook her head.&lt;\/p&gt;\n&lt;p&gt;\&quot;No, it wasn&#039;t a dream.\&quot;&lt;\/p&gt;\n&lt;p&gt;It couldn&#039;t have been a dream. There was no way it could have been a dream. Even now, she could vividly feel the pain of having her Aura Core forcibly excavated...&lt;\/p&gt;\n&lt;p&gt;Sigrid covered her face with both hands.&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;What&#039;s going on? What exactly happened? Is this a dream? Was that a dream? Which is it?&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;Amu asked in confusion:&lt;\/p&gt;\n&lt;p&gt;\&quot;Lady Ankertna? Are you alright? Should I call Lord Deforest?\&quot;&lt;\/p&gt;\n&lt;p&gt;Sigrid lifted her head at those words.&lt;\/p&gt;\n&lt;p&gt;\&quot;Morris...? But he&#039;s not... in the capital... he went on a wandering journey...\&quot;&lt;\/p&gt;\n&lt;p&gt;He had returned when he heard the news of her execution.&lt;\/p&gt;\n&lt;p&gt;\&quot;Not in the capital? He&#039;s working in the same knight order as you right now, isn&#039;t he?\&quot;&lt;\/p&gt;\n&lt;p&gt;As Amu spoke carefully, Sigrid stared at him with her mouth agape. Amu was now starting to get anxious, seeing this prim and taciturn female knight with such an expression for the first time.&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;Did she take drugs or alcohol? No, she&#039;s not the type to do that.&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;\&quot;I&#039;ll call Lord Morris now.\&quot;&lt;\/p&gt;\n&lt;p&gt;Amu gestured to the guards who had brought Sigrid to send a message. Then he offered her a chair, and Sigrid sat down in a daze.&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;Morris and I in the same knight order? That was 5 years ago?&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;As she sat in confusion, Amu offered her a cup of tea. Sigrid looked up and took the cup.&lt;\/p&gt;\n&lt;p&gt;\&quot;Thank you.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;It&#039;s nothing, just cheap tea.\&quot;&lt;\/p&gt;\n&lt;p&gt;Amu observed her. There seemed to be no abnormality in her pupils or breathing, so it didn&#039;t appear that she had taken any drugs or alcohol after all. What could have happened to this invincible female knight?&lt;\/p&gt;\n&lt;p&gt;Sigrid took a sip of tea and smiled faintly. He called it cheap tea, but it was better than what she had. As she was slowly emptying the cup, Morris entered with the guards. Given the hour, it was clear he had come straight from bed. His black hair was all messed up, his shirt was full of wrinkles. His pants and boots looked hastily put on as well. Sigrid felt a sense of dissonance as she looked at his face.&lt;\/p&gt;\n&lt;p&gt;Morris who had returned from his wandering journey had a scar on his face. But this Morris...&lt;\/p&gt;\n&lt;p&gt;&lt;i&gt;&#039;He&#039;s younger?&#039;&lt;\/i&gt;&lt;\/p&gt;\n&lt;p&gt;His face somehow looked tighter and smoother.&lt;\/p&gt;\n&lt;p&gt;\&quot;Sigrid? Are you okay?\&quot;&lt;\/p&gt;\n&lt;p&gt;Morris asked, squinting his eyes. When he heard that she had violated curfew and been taken to the guard station, Morris thought it was some kind of playful bet among the knights.&lt;\/p&gt;\n&lt;p&gt;But when the guards earnestly insisted it was true and even mentioned Amu&#039;s name, Morris realized it wasn&#039;t a joke. So he rushed over, and there was Sigrid, looking somehow out of it, unlike her usual self, staring at him.&lt;\/p&gt;\n&lt;p&gt;\&quot;What&#039;s wrong?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Morris...\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;What? What is it?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;How old are you?\&quot;&lt;\/p&gt;\n&lt;p&gt;What are you\u2015 Even as he thought this, Morris answered obediently.&lt;\/p&gt;\n&lt;p&gt;\&quot;Twenty-five.\&quot;&lt;\/p&gt;\n&lt;p&gt;Sigrid swallowed hard. Then it really is 5 years ago. Sigrid put down her teacup and hurriedly began to roll up her shirt.&lt;\/p&gt;\n&lt;p&gt;\&quot;Sigrid?! What are you doing!\&quot;&lt;\/p&gt;\n&lt;p&gt;A flustered Morris tried to pull her shirt back down, but Sigrid was relentless. Her slim waist was exposed to everyone. Looking over her shoulder at her side, Sigrid touched that area absent-mindedly and said:&lt;\/p&gt;\n&lt;p&gt;\&quot;The scar is gone.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;What?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Here, there should be a big sword wound... from fighting Beramund...\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Beramund? Why would you fight that bastard? Hey, Sigrid, are you okay?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Morris.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Yeah?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Morris Deforest.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;What?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;What year is it in the Imperial calendar...?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;300.\&quot;&lt;\/p&gt;\n&lt;p&gt;Sigrid felt her mind go blank.&lt;\/p&gt;\n&lt;p&gt;It really is 5 years ago.&lt;\/p&gt;\n&lt;p&gt;&#039;What&#039;s going on? I&#039;m sure I died. Did I come back after dying? To the past? How?&#039;&lt;\/p&gt;\n&lt;p&gt;Morris was starting to worry now. She didn&#039;t seem normal at all.&lt;\/p&gt;\n&lt;p&gt;\&quot;Sigrid?\&quot;&lt;\/p&gt;\n&lt;p&gt;His voice lowered and softened. At his call, Sigrid slowly blinked as if focusing and looked up at Morris. Those beautiful crimson eyes that always inspired awe, eyes that would normally be emotionless, were now filled with confusion.&lt;\/p&gt;\n&lt;p&gt;\&quot;Are you okay? What happened?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;I\u2015\&quot;&lt;\/p&gt;\n&lt;p&gt;Sigrid opened her mouth and then closed it. She leaned forward, almost falling onto Morris. It was an action she would never do normally, so Morris stiffened. He was starting to wonder if this might be some creature disguised as her.&lt;\/p&gt;\n&lt;p&gt;\&quot;Sigrid Ankertna?\&quot;&lt;\/p&gt;\n&lt;p&gt;Sigrid took a deep breath. His body was warm and firm. She could clearly hear his heart beating. Is this reality? Am I alive? The next moment, Sigrid lifted her head abruptly.&lt;\/p&gt;\n&lt;p&gt;\&quot;Alkerto.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;What?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Is Alkerto alive?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Of course he&#039;s alive.\&quot;&lt;\/p&gt;\n&lt;p&gt;Morris slowly examined Sigrid. He was starting to become certain that she had either fallen under some spell or that something was wrong with her.&lt;\/p&gt;\n&lt;p&gt;\&quot;Sigrid, first, calm down. Have you had contact with any strange people?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;What?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;A magician or a witch, or have you eaten any strange food? Did you go down an unusual path?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;That...\&quot;&lt;\/p&gt;\n&lt;p&gt;Sigrid started to speak but then stopped. She swallowed.&lt;\/p&gt;\n&lt;p&gt;\&quot;No, I&#039;m sorry. I just had a very realistic dream.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;A dream?\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Yes, I&#039;m sorry for causing trouble. I apologize for the inconvenience.\&quot;&lt;\/p&gt;\n&lt;p&gt;Speaking suddenly in a calm tone, she looked even more suspicious to Morris, who narrowed his eyes as he looked at Sigrid. Sigrid smiled awkwardly at his gaze.&lt;\/p&gt;\n&lt;p&gt;\&quot;I&#039;m really fine. I should go home and get some sleep. Oh, I can&#039;t go out because of the curfew, right? In that case, I&#039;ll have to impose on the makeshift lodgings here.\&quot;&lt;\/p&gt;\n&lt;p&gt;Amu was startled by those words. The &#039;makeshift lodgings&#039; here were the &#039;detention cells&#039;.&lt;\/p&gt;\n&lt;p&gt;\&quot;No, not at all. You can move even during curfew if accompanied by a guard. We&#039;ll escort you home, Lady Ankertna.\&quot;&lt;\/p&gt;\n&lt;p&gt;Morris nodded and said:&lt;\/p&gt;\n&lt;p&gt;\&quot;My house is closer, so stay at my place for the night.\&quot;&lt;\/p&gt;\n&lt;p&gt;Morris wanted to keep her in his sight for the night, as he still couldn&#039;t feel at ease. Sigrid shook her head.&lt;\/p&gt;\n&lt;p&gt;\&quot;No, I&#039;ll just go to my house. It&#039;s more comfortable there.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;That would double the work for the guards.\&quot;&lt;\/p&gt;\n&lt;p&gt;Morris subtly appealed to her sense of duty, and at those words, Sigrid hesitated with an \&quot;Ah, is that so?\&quot; before nodding. She didn&#039;t want to cause any more trouble to the guard station than this.&lt;\/p&gt;\n&lt;p&gt;\&quot;Alright then.\&quot;&lt;\/p&gt;\n&lt;p&gt;Escorted by one guard, Sigrid headed to Morris&#039;s house with him.&lt;\/p&gt;\n&lt;p&gt;As the second son of a viscount family, he had received a knighthood and left his family to live in an official residence in the capital.&lt;\/p&gt;\n&lt;p&gt;Even though it was called an official residence, it was incomparable to Sigrid&#039;s home. It was a proper house, occupying an entire building, with four servants.&lt;\/p&gt;\n&lt;p&gt;As they opened the front door and entered, a cozy living room space unfolded. It wasn&#039;t as luxurious as the high-end residential area in the 1st District where the Imperial Palace was located, but it was still a proper house in the 2nd District.&lt;\/p&gt;\n&lt;p&gt;\&quot;Come in.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;Excuse me.\&quot;&lt;\/p&gt;\n&lt;p&gt;As they entered the living room, Morris let out a long yawn, and Sigrid apologized.&lt;\/p&gt;\n&lt;p&gt;\&quot;I&#039;m sorry for waking you up for nothing. You should go to sleep soon, you have to go to work tomorrow.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;It&#039;s fine.\&quot;&lt;\/p&gt;\n&lt;p&gt;Morris shrugged. Sigrid carefully pressed her foot on the soft carpet on the floor. The fireplace was elaborately decorated, and the candleholders on the walls, though simple, were properly made of hammered brass. Morris spoke to her as she looked around:&lt;\/p&gt;\n&lt;p&gt;\&quot;I bought it all properly with my salary.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;I didn&#039;t say anything.\&quot;&lt;\/p&gt;\n&lt;p&gt;\&quot;You&#039;re always going on about
